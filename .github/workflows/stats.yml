name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=diegomarln&show_icons=true&theme=merko&hide_border=false" -o dist/stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=diegomarln&layout=compact&theme=merko&hide_border=false" -o dist/langs.svg
          mkdir -p dist

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}