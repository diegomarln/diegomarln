name: Generate Profile Assets

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: diegomarln
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Fetch GitHub Stats
        run: |
          mkdir -p dist
          curl -s "https://github-readme-stats.vercel.app/api?username=diegomarln&show_icons=true&theme=merko&hide_border=false" -o dist/stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=diegomarln&layout=compact&theme=merko&hide_border=false" -o dist/langs.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}